name: Rust Linux

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  workspace:
    name: workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: omne_foundation
    steps:
      - uses: actions/checkout@v5
        with:
          path: omne_foundation

      - name: Prepare workspace temp dir
        run: mkdir -p .tmp

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            omne_foundation -> omne_foundation/target

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Run Workspace Checks
        run: scripts/check-workspace.sh ci

  mcp-cross-platform:
    name: mcp-cross-platform (ubuntu-latest)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: omne_foundation
    steps:
      - uses: actions/checkout@v5
        with:
          path: omne_foundation

      - name: Prepare workspace temp dir
        run: mkdir -p .tmp

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            omne_foundation -> omne_foundation/target

      - name: Test mcp crates
        run: cargo test -p mcp-jsonrpc -p mcp-kit --all-features

      - name: Clippy mcp crates
        run: scripts/with-rust-exdev-workaround.sh cargo clippy -p mcp-jsonrpc -p mcp-kit --all-targets --all-features -- -D warnings

  secret-windows-target:
    name: secret-windows-target
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: omne_foundation
    steps:
      - uses: actions/checkout@v5
        with:
          path: omne_foundation

      - name: Prepare workspace temp dir
        run: mkdir -p .tmp

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install Rust Target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Check Secret Windows Target
        run: scripts/check-workspace.sh secret-kit-target x86_64-pc-windows-gnu
