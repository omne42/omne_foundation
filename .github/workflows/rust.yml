name: Rust

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workspace:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: omne_foundation
    steps:
      - uses: actions/checkout@v5
        with:
          path: omne_foundation

      - uses: actions/checkout@v5
        with:
          repository: omne42/omne-runtime
          path: omne-runtime

      - name: Prepare workspace temp dir
        run: mkdir -p .tmp

      - name: Checkout omne-runtime
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/omne-runtime
          ref: main
          token: ${{ secrets.OMNE_REPO_READ_TOKEN || github.token }}
          path: _deps/omne-runtime
          fetch-depth: 1

      - name: Move omne-runtime into sibling layout
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ../omne-runtime
          mv _deps/omne-runtime ../omne-runtime
          test -f ../omne-runtime/Cargo.toml
          test -f ../omne-runtime/crates/omne-fs-primitives/Cargo.toml
          test -f ../omne-runtime/crates/omne-process-primitives/Cargo.toml
          rmdir _deps 2>/dev/null || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            omne_foundation -> omne_foundation/target

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Run Workspace Checks
        run: scripts/check-workspace.sh ci

  mcp-cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: omne_foundation
    steps:
      - uses: actions/checkout@v5
        with:
          path: omne_foundation

      - uses: actions/checkout@v5
        with:
          repository: omne42/omne-runtime
          path: omne-runtime

      - name: Prepare workspace temp dir
        run: mkdir -p .tmp

      - name: Checkout omne-runtime
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/omne-runtime
          ref: main
          token: ${{ secrets.OMNE_REPO_READ_TOKEN || github.token }}
          path: _deps/omne-runtime
          fetch-depth: 1

      - name: Move omne-runtime into sibling layout
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ../omne-runtime
          mv _deps/omne-runtime ../omne-runtime
          test -f ../omne-runtime/Cargo.toml
          test -f ../omne-runtime/crates/omne-fs-primitives/Cargo.toml
          test -f ../omne-runtime/crates/omne-process-primitives/Cargo.toml
          rmdir _deps 2>/dev/null || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            omne_foundation -> omne_foundation/target

      - name: Test mcp crates
        run: cargo test -p mcp-jsonrpc -p mcp-kit --all-features

      - name: Clippy mcp crates
        run: scripts/with-rust-exdev-workaround.sh cargo clippy -p mcp-jsonrpc -p mcp-kit --all-targets --all-features -- -D warnings

  secret-windows-target:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: omne_foundation
    steps:
      - uses: actions/checkout@v5
        with:
          path: omne_foundation

      - uses: actions/checkout@v5
        with:
          repository: omne42/omne-runtime
          path: omne-runtime

      - name: Prepare workspace temp dir
        run: mkdir -p .tmp

      - name: Checkout omne-runtime
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/omne-runtime
          ref: main
          token: ${{ secrets.OMNE_REPO_READ_TOKEN || github.token }}
          path: _deps/omne-runtime
          fetch-depth: 1

      - name: Move omne-runtime into sibling layout
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ../omne-runtime
          mv _deps/omne-runtime ../omne-runtime
          test -f ../omne-runtime/Cargo.toml
          test -f ../omne-runtime/crates/omne-fs-primitives/Cargo.toml
          test -f ../omne-runtime/crates/omne-process-primitives/Cargo.toml
          rmdir _deps 2>/dev/null || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install Rust Target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Check Secret Windows Target
        run: scripts/check-workspace.sh secret-kit-target x86_64-pc-windows-gnu
