[package]
name = "secret-kit"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
structured-text-kit = { path = "../structured-text-kit" }
omne-systems-fs-primitives = { workspace = true }
omne-systems-process-primitives = { workspace = true }
serde_json = "1"
tokio = { version = "1", features = ["fs", "io-util", "macros", "process", "rt", "rt-multi-thread", "sync", "time"] }
zeroize = "1"

[dev-dependencies]
tempfile = "3"
